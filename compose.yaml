services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      EVIDROUTE_CORS_ORIGINS: http://localhost:8080
    volumes:
      - evidroute-artifacts:/app/artifacts
    ports:
      - "8000:8000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  evidroute-artifacts:
